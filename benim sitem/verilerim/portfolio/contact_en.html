    <main>
        <!-- Contact Section -->
        <section id="contact" class="contact section" style="padding-top: 10rem; padding-bottom: 6rem;">
            <div class="section-container contact-content">
                <h2 class="section-title-center fade-in-scroll">Get In Touch</h2>
                <p class="contact-desc fade-in-scroll">Always open to new projects, collaborations, or discussing the
                    aesthetics of design.</p>

                <a href="mailto:zeynepsuoncel@gmail.com"
                    class="contact-email fade-in-scroll">zeynepsuoncel@gmail.com</a>

                <div class="tags" style="justify-content: center;">
                    <a href="https://www.linkedin.com/in/zeynep-su-öncel-891084265" target="_blank" rel="noopener noreferrer" class="tag fade-in-scroll delay-1">LinkedIn</a>

                </div>

                <form action="https://formspree.io/f/xpqoqjvk" method="POST" class="contact-form fade-in-scroll">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" name="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="message" class="form-label">Your Message</label>
                        <textarea id="message" name="message" class="form-textarea" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </section>
