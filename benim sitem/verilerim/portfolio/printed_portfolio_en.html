    <main>
        <!-- Printed Portfolio Section -->
        <section id="printed-portfolio" class="section" style="padding: 0; position: relative; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--clr-bg-secondary);">
            
            <h2 class="fade-in-scroll" style="position: absolute; bottom: 4rem; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 0.9rem; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: var(--clr-bg-primary);">Printed Portfolio</h2>
            
            <div class="printed-slider-container fade-in-scroll" style="position: absolute; top:0; left:0; width: 100%; height: 100%;">
                <div class="p-slide p-slide-active" style="background-image: url('assets/printed_1.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center; position: absolute; top:0; left:0; width:100%; height:100%; opacity: 1; transition: opacity 1s ease-in-out;"></div>
                <div class="p-slide" style="background-image: url('assets/printed_2.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center; position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0; transition: opacity 1s ease-in-out;"></div>
                <div class="p-slide" style="background-image: url('assets/printed_mid.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center; position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0; transition: opacity 1s ease-in-out;"></div>
                <div class="p-slide" style="background-image: url('assets/printed_half.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center; position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0; transition: opacity 1s ease-in-out;"></div>
                <div class="p-slide" style="background-image: url('assets/printed_brownish.jpg'); background-size: cover; background-repeat: no-repeat; background-position: center; position: absolute; top:0; left:0; width:100%; height:100%; opacity: 0; transition: opacity 1s ease-in-out;"></div>
                
                <div class="slider-controls" style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 4%; z-index: 3; pointer-events: none;">
                    <button id="p-slider-prev" style="pointer-events: auto; background: transparent; border: none; color: var(--clr-bg-primary); cursor: pointer; opacity: 0.6; transition: opacity 0.3s, transform 0.3s; padding: 1rem; outline: none;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button id="p-slider-next" style="pointer-events: auto; background: transparent; border: none; color: var(--clr-bg-primary); cursor: pointer; opacity: 0.6; transition: opacity 0.3s, transform 0.3s; padding: 1rem; outline: none;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>
